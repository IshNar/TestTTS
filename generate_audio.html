<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孫子兵法 TTS 음성 일괄 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;padding:20px;min-height:100vh}
h1{text-align:center;margin-bottom:8px;font-size:24px}
.subtitle{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
.status-box{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px}
.status-box h2{font-size:15px;color:#7ba0cc;margin-bottom:12px}

/* Overall progress */
.overall-bar-wrap{background:#0f3460;border-radius:8px;height:32px;overflow:hidden;margin-bottom:8px;position:relative}
.overall-bar{height:100%;background:linear-gradient(90deg,#2e7d32,#43a047);border-radius:8px;transition:width 0.3s;width:0%}
.overall-bar-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.overall-stats{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:16px}

/* Voice progress */
.voice-section{margin-bottom:12px;padding:12px;background:#1a2744;border-radius:8px;border:1px solid #2a3a5c}
.voice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.voice-name{font-size:14px;font-weight:bold}
.voice-name .icon{margin-right:4px}
.voice-count{font-size:12px;color:#999}
.voice-bar-wrap{background:#0f3460;border-radius:6px;height:20px;overflow:hidden;position:relative}
.voice-bar{height:100%;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:6px;transition:width 0.3s;width:0%}
.voice-bar-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.voice-section.active{border-color:#42a5f5;background:#1a2f55}
.voice-section.done{border-color:#2e7d32;background:#1a2e1a}
.voice-section.done .voice-bar{background:linear-gradient(90deg,#2e7d32,#43a047)}

/* Current task */
.current-task{background:#2a1a44;border:1px solid #5c3a8c;border-radius:8px;padding:14px;margin-bottom:16px;min-height:60px}
.current-task .label{font-size:11px;color:#b39ddb;margin-bottom:4px}
.current-task .text{font-size:13px;line-height:1.5;color:#e0e0e0}
.current-task .meta{font-size:11px;color:#888;margin-top:6px}

/* Controls */
.controls{text-align:center;margin-bottom:20px}
.btn{padding:12px 32px;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin:0 6px;transition:all .2s}
.btn-start{background:#2e7d32;color:#fff}
.btn-start:hover{background:#388e3c}
.btn-start:disabled{background:#555;cursor:not-allowed}
.btn-download{background:#1565c0;color:#fff;display:none}
.btn-download:hover{background:#1976d2}
.btn-stop{background:#c62828;color:#fff}
.btn-stop:hover{background:#d32f2f}

/* Log */
.log{background:#111;border-radius:8px;padding:12px;max-height:200px;overflow-y:auto;font-family:monospace;font-size:11px;color:#aaa;margin-top:16px}
.log .err{color:#ef5350}
.log .ok{color:#66bb6a}
.log .info{color:#42a5f5}

/* ETA */
.eta-box{text-align:center;font-size:13px;color:#ffb74d;margin-bottom:16px}
</style>
</head>
<body>

<h1>🔊 孫子兵法 TTS 음성 일괄 생성기</h1>
<p class="subtitle">17개 음성 × 전체 문장 = 총 <span id="totalCount">0</span>개 파일 생성 → ZIP 다운로드</p>

<div class="controls">
  <button class="btn btn-start" id="btnStart" onclick="startGenerate()">▶ 생성 시작</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopGenerate()" style="display:none">■ 중지</button>
  <button class="btn btn-download" id="btnDownload" onclick="downloadZip()">📦 ZIP 다운로드</button>
</div>

<div class="eta-box" id="etaBox"></div>

<!-- Current task -->
<div class="current-task" id="currentTask">
  <div class="label">대기 중</div>
  <div class="text">시작 버튼을 눌러주세요</div>
</div>

<!-- Overall progress -->
<div class="status-box">
  <h2>전체 진행률</h2>
  <div class="overall-bar-wrap">
    <div class="overall-bar" id="overallBar"></div>
    <div class="overall-bar-text" id="overallBarText">0 / 0</div>
  </div>
  <div class="overall-stats">
    <span id="statCompleted">완료: 0</span>
    <span id="statFailed">실패: 0</span>
    <span id="statRemaining">남은: 0</span>
  </div>
</div>

<!-- Per-voice progress -->
<div id="voiceList"></div>

<!-- Log -->
<div class="log" id="log"></div>

<!-- Kokoro TTS engine -->
<script src="https://tts.rocks/tts.js"></script>
<!-- JSZip for download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ===== Chapter data (same as index.html) =====

var kokoroVoices=[
  {name:'Heart (미국 여성, 기본)', voice:'af_heart',    gender:'F', region:'US'},
  {name:'Sky (미국 여성)',         voice:'af_sky',      gender:'F', region:'US'},
  {name:'Bella (미국 여성)',       voice:'af_bella',    gender:'F', region:'US'},
  {name:'Nicole (미국 여성)',      voice:'af_nicole',   gender:'F', region:'US'},
  {name:'Sarah (미국 여성)',       voice:'af_sarah',    gender:'F', region:'US'},
  {name:'Nova (미국 여성)',        voice:'af_nova',     gender:'F', region:'US'},
  {name:'Alloy (미국 여성)',       voice:'af_alloy',    gender:'F', region:'US'},
  {name:'Jessica (미국 여성)',     voice:'af_jessica',  gender:'F', region:'US'},
  {name:'River (미국 여성)',       voice:'af_river',    gender:'F', region:'US'},
  {name:'Aoede (미국 여성)',       voice:'af_aoede',    gender:'F', region:'US'},
  {name:'Kore (미국 여성)',        voice:'af_kore',     gender:'F', region:'US'},
  {name:'Adam (미국 남성)',        voice:'am_adam',     gender:'M', region:'US'},
  {name:'Michael (미국 남성)',     voice:'am_michael',  gender:'M', region:'US'},
  {name:'Emma (영국 여성)',        voice:'bf_emma',     gender:'F', region:'UK'},
  {name:'Isabella (영국 여성)',    voice:'bf_isabella', gender:'F', region:'UK'},
  {name:'George (영국 남성)',      voice:'bm_george',   gender:'M', region:'UK'},
  {name:'Lewis (영국 남성)',       voice:'bm_lewis',    gender:'M', region:'UK'},
];

// Count total
var totalPassages=0;
chapters.forEach(function(c){totalPassages+=c.p.length});
var totalFiles=kokoroVoices.length*totalPassages;
document.getElementById('totalCount').textContent=totalFiles;

// ===== State =====
var zip=null, stopped=false, completed=0, failed=0;
var startTime=0;

// ===== UI helpers =====
function log(msg,cls){
  var el=document.getElementById('log');
  var d=document.createElement('div');
  if(cls)d.className=cls;
  d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

function updateOverall(){
  var done=completed+failed;
  var pct=totalFiles?Math.round(done/totalFiles*100):0;
  document.getElementById('overallBar').style.width=pct+'%';
  document.getElementById('overallBarText').textContent=done+' / '+totalFiles+' ('+pct+'%)';
  document.getElementById('statCompleted').textContent='완료: '+completed;
  document.getElementById('statFailed').textContent='실패: '+failed;
  document.getElementById('statRemaining').textContent='남은: '+(totalFiles-done);

  // ETA
  if(done>0&&done<totalFiles){
    var elapsed=(Date.now()-startTime)/1000;
    var perItem=elapsed/done;
    var remaining=(totalFiles-done)*perItem;
    var mins=Math.floor(remaining/60);
    var secs=Math.floor(remaining%60);
    document.getElementById('etaBox').textContent='예상 남은 시간: '+mins+'분 '+secs+'초';
  }else if(done>=totalFiles){
    document.getElementById('etaBox').textContent='';
  }
}

function updateVoiceBar(vi,count){
  var bar=document.getElementById('vbar-'+vi);
  var text=document.getElementById('vtext-'+vi);
  var pct=totalPassages?Math.round(count/totalPassages*100):0;
  if(bar)bar.style.width=pct+'%';
  if(text)text.textContent=count+'/'+totalPassages;
}

function setCurrentTask(voiceName,chNum,pIdx,text){
  var el=document.getElementById('currentTask');
  el.innerHTML='<div class="label">현재 생성 중</div>'+
    '<div class="text">🔊 <b>'+voiceName+'</b> — 제'+chNum+'편 §'+chNum+'.'+(pIdx+1)+'</div>'+
    '<div class="meta" style="margin-top:6px;font-size:11px;color:#bbb;line-height:1.4">"'+
    (text.length>100?text.substring(0,100)+'...':text)+'"</div>';
}

// ===== Build voice list UI =====
function buildVoiceList(){
  var html='';
  kokoroVoices.forEach(function(v,i){
    var icon=v.gender==='M'?'👨':'👩';
    html+='<div class="voice-section" id="vsec-'+i+'">'+
      '<div class="voice-header">'+
        '<span class="voice-name"><span class="icon">'+icon+'</span>['+v.region+'] '+v.name+'</span>'+
        '<span class="voice-count" id="vcnt-'+i+'">0/'+totalPassages+'</span>'+
      '</div>'+
      '<div class="voice-bar-wrap">'+
        '<div class="voice-bar" id="vbar-'+i+'"></div>'+
        '<div class="voice-bar-text" id="vtext-'+i+'">0/'+totalPassages+'</div>'+
      '</div></div>';
  });
  document.getElementById('voiceList').innerHTML=html;

buildVoiceList();

// ===== Download progress tracking =====
var origFetch=window.fetch;
window.fetch=function(){
  return origFetch.apply(this,arguments).then(function(response){
    // Only track large downloads (model files)
    var contentLength=response.headers.get('content-length');
    if(!contentLength||parseInt(contentLength)<1000000) return response;

    var total=parseInt(contentLength);
    var loaded=0;
    var taskEl=document.getElementById('currentTask');

    log('모델 다운로드 시작: '+(total/1024/1024).toFixed(1)+'MB','info');

    var reader=response.body.getReader();
    var stream=new ReadableStream({
      start:function(controller){
        function push(){
          reader.read().then(function(result){
            if(result.done){controller.close();return}
            loaded+=result.value.length;
            var pct=Math.round(loaded/total*100);
            var mb=(loaded/1024/1024).toFixed(1);
            var totalMB=(total/1024/1024).toFixed(1);
            if(taskEl){
              taskEl.innerHTML='<div class="label">📥 모델 다운로드 중</div>'+
                '<div class="text">'+mb+'MB / '+totalMB+'MB ('+pct+'%)</div>'+
                '<div style="background:#0f3460;border-radius:6px;height:16px;margin-top:8px;overflow:hidden">'+
                '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:6px;transition:width 0.3s"></div></div>';
            }
            controller.enqueue(result.value);
            push();
          });
        }
        push();
      }
    });

    return new Response(stream,{
      headers:response.headers,
      status:response.status,
      statusText:response.statusText
    });
  });
};

// ===== Kokoro init =====
async function initKokoro(){
  log('Kokoro AI 모델 로딩 중...','info');
  window.TTS=window.TTS||{};
  TTS.TTSProvider='kokoro';
  TTS.useKokoroTTS=true;
  if(!TTS.kokoroSettings) TTS.kokoroSettings={rate:false,voiceName:false,model:'kokoro-82M-v1.0'};
  if(typeof TTS.initKokoro==='function'){
    var result=await TTS.initKokoro();
    if(result!==false&&TTS.kokoroTtsInstance){
      // Restore original fetch
      window.fetch=origFetch;
      log('Kokoro AI 준비 완료! ('+( TTS.kokoroDevice||'wasm')+')','ok');
      return true;
    }
  }
  log('Kokoro 로드 실패!','err');
  return false;
}

// ===== Generate one audio =====
function generateOne(text,voiceName){
  return new Promise(function(resolve){
    TTS.kokoroSettings.voiceName=voiceName;
    TTS.kokoroSettings.speed=1.0;

    var origFinished=TTS.finishedAudio;
    var resolved=false;

    function done(src){
      if(resolved) return;
      resolved=true;
      TTS.finishedAudio=origFinished;
      resolve(src);
    }

    TTS.finishedAudio=function(){
      if(TTS.audio&&TTS.audio.src) done(TTS.audio.src);
      else done(null);
    };

    TTS.kokoroTTS(text).then(function(){
      if(TTS.audio){
        TTS.audio.pause();
        TTS.audio.muted=true;
        if(TTS.audio.src) done(TTS.audio.src);
      }
    }).catch(function(e){
      log('생성 오류: '+e.message,'err');
      done(null);
    });

    // Timeout 60s
    setTimeout(function(){done(null)},60000);
  });
}

// Convert blob URL or data URL to ArrayBuffer
async function urlToArrayBuffer(url){
  var resp=await fetch(url);
  return resp.arrayBuffer();
}

// ===== Main generate loop =====
async function startGenerate(){
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='inline-block';
  document.getElementById('btnDownload').style.display='none';
  stopped=false;
  completed=0;
  failed=0;
  startTime=Date.now();
  zip=new JSZip();

  // Init Kokoro
  var ok=await initKokoro();
  if(!ok){
    log('Kokoro 초기화 실패. 중단합니다.','err');
    document.getElementById('btnStart').disabled=false;
    document.getElementById('btnStart').style.display='inline-block';
    document.getElementById('btnStop').style.display='none';
    return;
  }

  // Generate all
  for(var vi=0;vi<kokoroVoices.length;vi++){
    if(stopped) break;
    var voice=kokoroVoices[vi];
    var sec=document.getElementById('vsec-'+vi);
    if(sec) sec.classList.add('active');
    var voiceDone=0;

    log('음성 시작: ['+voice.region+'] '+voice.name+' ('+voice.voice+')','info');

    for(var ci=0;ci<chapters.length;ci++){
      if(stopped) break;
      var ch=chapters[ci];
      for(var pi=0;pi<ch.p.length;pi++){
        if(stopped) break;
        var text=ch.p[pi][0];
        var fileName=voice.voice+'/ch'+ch.num+'-'+(pi+1)+'.wav';

        setCurrentTask(voice.name,ch.num,pi,text);

        var src=await generateOne(text,voice.voice);
        if(src){
          try{
            var buf=await urlToArrayBuffer(src);
            zip.file(fileName,buf);
            completed++;
            voiceDone++;
            log('✓ '+fileName+' ('+Math.round(buf.byteLength/1024)+'KB)','ok');
          }catch(e){
            failed++;
            log('✗ '+fileName+' 저장 실패: '+e.message,'err');
          }
        }else{
          failed++;
          log('✗ '+fileName+' 생성 실패','err');
        }

        updateVoiceBar(vi,voiceDone);
        document.getElementById('vcnt-'+vi).textContent=voiceDone+'/'+totalPassages;
        updateOverall();

        // Small yield to keep UI responsive
        await new Promise(function(r){setTimeout(r,50)});
      }
    }

    if(sec){sec.classList.remove('active');sec.classList.add('done')}
  }

  // Done
  document.getElementById('btnStop').style.display='none';
  if(!stopped&&completed>0){
    document.getElementById('btnDownload').style.display='inline-block';
    log('===== 생성 완료! 총 '+completed+'개 성공, '+failed+'개 실패 =====','ok');
    document.getElementById('currentTask').innerHTML=
      '<div class="label">완료!</div><div class="text">✅ '+completed+'개 파일 생성 완료. ZIP 다운로드 버튼을 눌러주세요.</div>';
    document.getElementById('etaBox').textContent='총 소요 시간: '+Math.round((Date.now()-startTime)/1000)+'초';
  }else if(stopped){
    document.getElementById('btnStart').disabled=false;
    document.getElementById('btnStart').style.display='inline-block';
    log('===== 사용자에 의해 중지됨 =====','info');
    if(completed>0) document.getElementById('btnDownload').style.display='inline-block';
  }
}

function stopGenerate(){
  stopped=true;
  log('중지 요청...','info');
  document.getElementById('btnStop').style.display='none';
}

async function downloadZip(){
  log('ZIP 파일 생성 중... (잠시 대기)','info');
  document.getElementById('btnDownload').textContent='⏳ 압축중...';
  document.getElementById('btnDownload').disabled=true;
  try{
    var blob=await zip.generateAsync({type:'blob'},function(meta){
      document.getElementById('btnDownload').textContent='⏳ 압축중... '+Math.round(meta.percent)+'%';
    });
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='tts_audio.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    log('ZIP 다운로드 시작!','ok');
  }catch(e){
    log('ZIP 생성 오류: '+e.message,'err');
  }
  document.getElementById('btnDownload').textContent='📦 ZIP 다운로드';
  document.getElementById('btnDownload').disabled=false;
}
</script>
