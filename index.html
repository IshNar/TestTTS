<script>
var chapters=[
{num:1,en:"Chapter 1: Laying Plans",kr:"제1편: 시계 (始計)",p:[
['Sun Tzu said: The <V d="전쟁의 기술, 병법">art of war</V> is of <V d="매우 중요한">vital importance</V> to the State.',"손자가 말하였다: 전쟁의 기술은 국가에 매우 중요한 것이다."],
['It is a matter of <V d="삶과 죽음">life and death</V>, a road either to safety or to <V d="파멸, 몰락">ruin</V>. <V d="그러므로">Hence</V> it is a subject of <V d="탐구, 조사">inquiry</V> which can on no account be <V d="소홀히 하다, 무시하다">neglected</V>.',"그것은 삶과 죽음의 문제이며, 안전 혹은 파멸로 가는 길이다. 그러므로 결코 소홀히 할 수 없는 탐구의 대상이다."],
['These are: (1) The <V d="도덕 법칙, 도(道)">Moral Law</V>; (2) Heaven; (3) Earth; (4) The Commander; (5) <V d="방법과 규율">Method and discipline</V>.',"이것들은 다음과 같다: (1) 도(道); (2) 천(天); (3) 지(地); (4) 장(將); (5) 법(法)."],
['The MORAL LAW causes the people to be in <V d="완전한 일치, 합의">complete accord</V> with their ruler, so that they will follow him <V d="~에 상관없이">regardless of</V> their lives, <V d="당황하지 않는, 두려워하지 않는">undismayed</V> by any danger.',"도(道)란 백성들이 군주와 완전히 뜻을 같이하게 하여, 어떤 위험에도 두려워하지 않고 목숨을 아끼지 않고 따르게 하는 것이다."],
['HEAVEN <V d="의미하다, 나타내다">signifies</V> night and day, cold and heat, times and seasons.',"천(天)이란 밤과 낮, 추위와 더위, 때와 계절을 의미한다."],
['EARTH <V d="포함하다, 구성하다">comprises</V> distances, great and small; danger and security; open ground and <V d="좁은 통로, 협로">narrow passes</V>; the chances of life and death.',"지(地)란 먼 거리와 가까운 거리, 위험과 안전, 넓은 평야와 좁은 통로, 삶과 죽음의 기회를 포함한다."],
['The COMMANDER stands for the <V d="덕목, 미덕">virtues</V> of wisdom, <V d="성실, 진실성">sincerity</V>, <V d="자비, 인자함">benevolence</V>, courage and <V d="엄격함">strictness</V>.',"장(將)이란 지혜, 신의, 인자함, 용기, 엄격함의 덕목을 갖춘 자를 말한다."],
['These five heads should be familiar to every general: he who knows them will be <V d="승리하는">victorious</V>; he who knows them not will fail.',"이 다섯 가지 항목은 모든 장수가 알아야 할 것이다. 이를 아는 자는 승리할 것이요, 모르는 자는 실패할 것이다."],
['All warfare is based on <V d="속임수, 기만">deception</V>.',"모든 전쟁은 속임수에 기반한다."],
['<V d="그러므로">Hence</V>, when able to attack, we must <V d="~인 것처럼 보이다">seem unable</V>; when using our forces, we must seem <V d="비활동적인, 움직이지 않는">inactive</V>; when we are near, we must make the enemy believe we are far away; when far away, we must make him believe we are near.',"그러므로 공격할 수 있을 때 공격할 수 없는 것처럼 보여야 하고, 병력을 쓸 때 쓰지 않는 것처럼 보여야 하고, 가까이 있을 때 멀리 있다고 믿게 하고, 멀리 있을 때 가까이 있다고 믿게 해야 한다."],
['<V d="미끼를 내걸다">Hold out baits</V> to <V d="유인하다, 유혹하다">entice</V> the enemy. <V d="~인 척하다, 가장하다">Feign</V> disorder, and crush him.',"미끼를 내걸어 적을 유인하라. 혼란을 가장하고, 그를 격파하라."],
['If your opponent is of <V d="성급한, 화를 잘 내는">choleric</V> temper, seek to <V d="자극하다, 화나게 하다">irritate</V> him. Pretend to be weak, that he may grow <V d="오만한, 거만한">arrogant</V>.',"적이 성격이 급하면 그를 자극하라. 약한 척하여 그가 오만해지게 하라."],
['Attack him where he is <V d="준비되지 않은">unprepared</V>, appear where you are not expected.',"적이 대비하지 못한 곳을 공격하고, 예상치 못한 곳에 나타나라."],
['Now the general who wins a battle makes many <V d="계산, 숙고">calculations</V> in his <V d="사원, 묘당">temple</V> <V d="~하기 전에 (고어)">ere</V> the battle is fought. The general who loses a battle makes but few calculations <V d="사전에, 미리">beforehand</V>.',"전투에서 이기는 장수는 싸우기 전에 묘당에서 많은 계산을 한다. 전투에서 지는 장수는 사전에 계산을 거의 하지 않는다."],
]},
{num:2,en:"Chapter 2: Waging War",kr:"제2편: 작전 (作戰)",p:[
['When you <V d="교전하다, 참여하다">engage in</V> actual fighting, if victory is long in coming, then men\'s weapons will grow <V d="무뎌진">dull</V> and their <V d="열정, 투지">ardor</V> will be <V d="꺾이다, 약해지다">damped</V>.',"실제 전투에 임할 때, 승리가 늦어지면 병사들의 무기는 무뎌지고 사기는 꺾일 것이다."],
['Thus, though we have heard of stupid <V d="서두름, 급함">haste</V> in war, <V d="영리함, 현명함">cleverness</V> has never been seen associated with long delays.',"전쟁에서 어리석은 서두름은 들어본 적 있으나, 오래 끄는 것이 현명했던 적은 본 적이 없다."],
['There is no <V d="사례, 경우">instance</V> of a country having <V d="이익을 얻다">benefited</V> from <V d="장기간의">prolonged</V> warfare.',"장기전으로 이익을 본 나라는 없다."],
['Bring <V d="군수물자">war material</V> with you from home, but <V d="(식량을) 현지 조달하다">forage</V> on the enemy. Thus the army will have food enough for its needs.',"군수물자는 본국에서 가져가되, 식량은 적지에서 조달하라. 그러면 군대의 식량이 충분할 것이다."],
['In war, then, let your great object be victory, not <V d="장기간의 전역/작전">lengthy campaigns</V>.',"그러므로 전쟁에서 큰 목표는 승리여야 하지, 장기전이 되어서는 안 된다."],
]},
{num:3,en:"Chapter 3: Attack by Stratagem",kr:"제3편: 모공 (謀攻)",p:[
['Hence to fight and conquer in all your battles is not <V d="최고의 탁월함">supreme excellence</V>; supreme excellence consists in breaking the enemy\'s <V d="저항">resistance</V> without fighting.',"그러므로 모든 전투에서 싸워 이기는 것이 최고의 탁월함이 아니다. 최고의 탁월함은 싸우지 않고 적의 저항을 꺾는 것이다."],
['Thus the highest form of <V d="장수의 자질, 용병술">generalship</V> is to <V d="좌절시키다, 무산시키다">balk</V> the enemy\'s plans; the next best is to prevent the <V d="합류, 합병">junction</V> of the enemy\'s forces; the next in order is to attack the enemy\'s army in the field; and the worst policy of all is to <V d="포위하다">besiege</V> <V d="성벽으로 둘러싸인 도시">walled cities</V>.',"최고의 용병술은 적의 계략을 무산시키는 것이고, 그 다음은 적의 병력이 합류하는 것을 막는 것이고, 그 다음은 적의 군대를 전장에서 공격하는 것이며, 최악의 정책은 성을 포위하는 것이다."],
['Therefore the skillful leader <V d="굴복시키다, 정복하다">subdues</V> the enemy\'s troops without any fighting; he captures their cities without <V d="~에 포위를 하다">laying siege to</V> them; he <V d="전복시키다, 무너뜨리다">overthrows</V> their kingdom without <V d="장기간의 작전">lengthy operations</V> in the field.',"그러므로 능숙한 지휘관은 싸우지 않고 적군을 굴복시키고, 포위하지 않고 적의 도시를 빼앗고, 장기간의 야전 작전 없이 적의 왕국을 무너뜨린다."],
['He will win who knows when to fight and when not to fight. He will win who knows how to handle both <V d="우세한">superior</V> and <V d="열세한">inferior</V> forces. He will win whose army is <V d="고무된, 활기 넘치는">animated</V> by the same spirit throughout all its <V d="대열, 계급">ranks</V>.',"싸울 때와 싸우지 않을 때를 아는 자가 이긴다. 우세한 병력과 열세한 병력 모두를 다룰 줄 아는 자가 이긴다. 전 군이 같은 정신으로 하나 된 자가 이긴다."],
['If you know the enemy and know yourself, you need not fear the result of a hundred battles. If you know yourself but not the enemy, for every victory gained you will also <V d="(패배를) 겪다, 당하다">suffer</V> a defeat. If you know neither the enemy nor yourself, you will <V d="굴복하다, 쓰러지다">succumb</V> in every battle.',"적을 알고 나를 알면 백 번 싸워도 위태롭지 않다. 나를 알되 적을 모르면 한 번 이기고 한 번 진다. 적도 모르고 나도 모르면 매 전투마다 반드시 패한다."],
]},
{num:4,en:"Chapter 4: Tactical Dispositions",kr:"제4편: 군형 (軍形)",p:[
['The good fighters of old first put themselves beyond the <V d="가능성">possibility</V> of defeat, and then waited for an opportunity of defeating the enemy.',"옛날의 뛰어난 장수들은 먼저 자신을 패배할 수 없는 위치에 놓고, 그런 다음 적을 이길 기회를 기다렸다."],
['To <V d="확보하다, 지키다">secure</V> ourselves against defeat lies in our own hands, but the opportunity of defeating the enemy is provided by the enemy himself.',"패배를 방지하는 것은 우리 손에 달려 있으나, 적을 이길 기회는 적 자신이 제공한다."],
['Thus it is that in war the <V d="승리하는">victorious</V> <V d="전략가">strategist</V> only seeks battle after the victory has been won, whereas he who is <V d="운명지어진">destined</V> to defeat first fights and afterwards looks for victory.',"전쟁에서 승리하는 전략가는 이미 승리가 확정된 후에 전투를 구하고, 패배할 운명의 자는 먼저 싸우고 나서 승리를 찾는다."],
['The <V d="돌격, 맹공">onrush</V> of a <V d="정복하는">conquering</V> force is like the <V d="터짐, 폭발">bursting</V> of <V d="억눌린, 갇힌">pent-up</V> waters into a <V d="깊은 협곡">chasm</V> a thousand <V d="패덤 (약 1.8m 깊이 단위)">fathoms</V> deep.',"정복하는 군대의 돌격은 천 길 깊이의 골짜기로 쏟아지는 물과 같다."],
]},
{num:5,en:"Chapter 5: Energy",kr:"제5편: 병세 (兵勢)",p:[
['In all fighting, the <V d="직접적인">direct</V> method may be used for joining battle, but <V d="간접적인">indirect</V> methods will be needed in order to secure victory.',"모든 전투에서 정공법은 교전에 쓰이지만, 승리를 확보하려면 기습이 필요하다."],
['There are not more than five <V d="음악의 음(音)">musical notes</V>, yet the <V d="조합, 결합">combinations</V> of these five give rise to more <V d="선율, 멜로디">melodies</V> than can ever be heard.',"음악의 음은 다섯에 불과하지만, 이 다섯의 조합은 다 들을 수 없을 만큼 많은 선율을 만들어낸다."],
['Energy may be <V d="비유되다">likened</V> to the bending of a <V d="쇠뇌, 석궁">crossbow</V>; decision, to the releasing of a <V d="방아쇠">trigger</V>.',"세(勢)는 쇠뇌를 당기는 것에 비유할 수 있고, 결단은 방아쇠를 당기는 것에 비유할 수 있다."],
['<V d="가장된, 꾸며진">Simulated</V> disorder <V d="전제하다, 가정하다">postulates</V> perfect <V d="규율, 훈련">discipline</V>, simulated fear postulates courage; simulated weakness postulates strength.',"가장된 혼란은 완벽한 규율을 전제하고, 가장된 두려움은 용기를 전제하며, 가장된 약함은 강함을 전제한다."],
]},
{num:6,en:"Chapter 6: Weak Points and Strong",kr:"제6편: 허실 (虛實)",p:[
['Whoever is first in the field and <V d="~을 기다리다">awaits</V> the coming of the enemy, will be fresh for the fight; whoever is second in the field and has to <V d="서두르다, 급히 가다">hasten</V> to battle, will arrive <V d="지친, 기진맥진한">exhausted</V>.',"먼저 전장에 도착하여 적을 기다리는 자는 전투에 생기가 넘칠 것이고, 늦게 도착하여 서둘러 전투에 임해야 하는 자는 지쳐서 도착할 것이다."],
['Therefore the clever <V d="전투원, 싸우는 자">combatant</V> <V d="강요하다, 부과하다">imposes</V> his will on the enemy, but does not allow the enemy\'s will to be imposed on him.',"그러므로 유능한 전투가는 자신의 의지를 적에게 강요하되, 적의 의지에 끌려가지 않는다."],
['All men can see the <V d="전술">tactics</V> <V d="~에 의하여">whereby</V> I conquer, but what none can see is the <V d="전략">strategy</V> out of which victory is <V d="발전하다, 만들어지다">evolved</V>.',"모든 사람이 내가 이기는 전술은 볼 수 있으나, 승리가 만들어지는 전략은 아무도 볼 수 없다."],
['Military tactics are like <V d="~와 같이 (고어)">unto</V> water; for water in its natural course runs away from high places and <V d="서둘러 가다">hastens</V> downwards. So in war, avoid what is strong and <V d="치다, 공격하다">strike</V> at what is weak.',"군사 전술은 물과 같다. 물은 높은 곳에서 흘러내려 낮은 곳으로 간다. 전쟁에서도 강한 것을 피하고 약한 것을 쳐라."],
['Therefore, just as water <V d="유지하다, 보유하다">retains</V> no <V d="일정한, 변하지 않는">constant</V> shape, so in warfare there are no constant conditions.',"물이 일정한 형태를 유지하지 않듯이, 전쟁에서도 일정한 조건은 없다."],
]},
{num:7,en:"Chapter 7: Maneuvering",kr:"제7편: 군쟁 (軍爭)",p:[
['Let your <V d="신속함, 빠름">rapidity</V> be that of the wind, your <V d="밀집함, 조밀함">compactness</V> that of the forest.',"신속함은 바람과 같이, 밀집함은 숲과 같이 하라."],
['In <V d="습격, 약탈">raiding</V> and <V d="약탈, 노략질">plundering</V> be like fire, in <V d="부동, 움직이지 않음">immovability</V> like a mountain.',"약탈과 습격에서는 불과 같이, 움직이지 않을 때는 산과 같이 하라."],
['Let your plans be dark and <V d="뚫을 수 없는, 불가해한">impenetrable</V> as night, and when you move, fall like a <V d="벼락, 번개">thunderbolt</V>.',"계획은 밤처럼 어둡고 꿰뚫을 수 없게 하고, 움직일 때는 벼락처럼 내리쳐라."],
['A whole army may be robbed of its spirit; a <V d="총사령관">commander-in-chief</V> may be robbed of his <V d="침착함, 냉정함">presence of mind</V>.',"전군의 사기를 빼앗을 수 있고, 총사령관의 침착함을 빼앗을 수 있다."],
['When you <V d="포위하다">surround</V> an army, leave an <V d="출구, 탈출구">outlet</V> free. Do not press a <V d="절박한, 필사적인">desperate</V> <V d="적, 원수">foe</V> too hard.',"군대를 포위할 때는 탈출구를 남겨두라. 절박한 적을 너무 몰아붙이지 마라."],
]},
{num:8,en:"Chapter 8: Variation in Tactics",kr:"제8편: 구변 (九變)",p:[
['There are roads which must not be followed, armies which must not be attacked, towns which must not be <V d="포위하다">besieged</V>, positions which must not be <V d="다투다, 경쟁하다">contested</V>, commands of the <V d="군주, 주권자">sovereign</V> which must not be obeyed.',"따라가서는 안 되는 길, 공격해서는 안 되는 군대, 포위해서는 안 되는 도시, 다투어서는 안 되는 위치, 따라서는 안 되는 군주의 명령이 있다."],
['The art of war teaches us to <V d="의지하다, 신뢰하다">rely</V> not on the <V d="가능성, 개연성">likelihood</V> of the enemy\'s not coming, but on our own <V d="준비, 대비">readiness</V> to receive him.',"전쟁의 기술은 적이 오지 않을 가능성이 아니라 우리가 맞을 준비에 의지하라고 가르친다."],
['There are five dangerous <V d="결함, 결점">faults</V> which may affect a general: <V d="무모함, 저돌성">Recklessness</V>, which leads to <V d="파괴, 파멸">destruction</V>; <V d="비겁함, 겁 많음">cowardice</V>, which leads to <V d="포획, 포로">capture</V>; a <V d="급한, 성급한">hasty</V> temper, which can be <V d="자극되다, 도발되다">provoked</V> by <V d="모욕">insults</V>; a <V d="섬세함, 예민함">delicacy</V> of honor which is sensitive to shame; <V d="지나친 걱정, 과잉 배려">over-solicitude</V> for his men, which exposes him to worry.',"장수의 다섯 가지 위험한 결함: 무모함은 파멸로, 비겁함은 포로로, 급한 성미는 모욕에 자극받고, 예민한 자존심은 수치에 약하고, 지나친 걱정은 근심에 노출된다."],
]},
{num:9,en:"Chapter 9: The Army on the March",kr:"제9편: 행군 (行軍)",p:[
['Camp in high places, facing the sun. Do not <V d="올라가다, 오르다">climb</V> heights in order to fight.',"높은 곳에 주둔하되 해를 마주하라. 싸우려고 높은 곳에 오르지 마라."],
['<V d="겸손한, 공손한">Humble</V> words and increased <V d="준비, 대비">preparations</V> are signs that the enemy is about to <V d="진격하다, 나아가다">advance</V>. <V d="거친, 난폭한">Violent</V> language and driving forward as if to the attack is a sign that he will <V d="후퇴하다, 물러나다">retreat</V>.',"겸손한 말과 늘어나는 준비는 적이 진격하려는 징후이다. 거친 말과 공격하듯 전진하는 것은 후퇴할 징후이다."],
['Therefore soldiers must be treated in the first <V d="경우, 처음">instance</V> with <V d="인도주의, 인간애">humanity</V>, but kept under control by means of iron <V d="규율, 훈련">discipline</V>. This is a <V d="확실한, 틀림없는">certain</V> road to victory.',"병사를 처음에는 인도적으로 대하되, 철의 규율로 통제해야 한다. 이것이 확실한 승리의 길이다."],
]},
{num:10,en:"Chapter 10: Terrain",kr:"제10편: 지형 (地形)",p:[
['The natural <V d="형태, 지형">formation</V> of the country is the soldier\'s best <V d="동맹, 협력자">ally</V>.',"지형의 자연적 형태는 군인의 최고의 동맹이다."],
['He who knows these things, and in fighting puts his knowledge into <V d="실행, 실천">practice</V>, will win his battles.',"이것을 알고 전투에서 실천하는 자는 이길 것이다."],
['If you know the enemy and know yourself, your victory will not stand in doubt; if you know Heaven and know Earth, you may make your victory <V d="완전한, 완벽한">complete</V>.',"적을 알고 나를 알면 승리가 의심스럽지 않고, 하늘을 알고 땅을 알면 승리를 완전하게 할 수 있다."],
]},
{num:11,en:"Chapter 11: The Nine Situations",kr:"제11편: 구지 (九地)",p:[
['On <V d="절박한, 필사적인">desperate</V> ground, fight.',"사지에서는 싸워라."],
['<V d="신속함, 빠름">Rapidity</V> is the <V d="본질, 핵심">essence</V> of war: take advantage of the enemy\'s <V d="준비가 안 된 상태">unreadiness</V>, make your way by <V d="예상치 못한">unexpected</V> routes, and attack <V d="경비가 없는, 무방비의">unguarded</V> spots.',"신속함이 전쟁의 본질이다."],
['Throw your soldiers into positions <V d="~한 곳에서 (고어)">whence</V> there is no escape, and they will prefer death to <V d="도주, 달아남">flight</V>.',"병사들을 탈출구가 없는 위치에 던져 놓으면, 도주보다 죽음을 택할 것이다."],
['At the <V d="결정적인, 중대한">critical</V> moment, the leader of an army acts like one who has climbed up a height and then kicks away the <V d="사다리">ladder</V> behind him.',"결정적 순간에 군대의 지도자는 높이 올라가서 뒤의 사다리를 걷어차 버리는 자처럼 행동한다."],
['He burns his <V d="배, 보트">boats</V> and breaks his <V d="조리 도구, 솥">cooking-pots</V>.',"배를 태우고 솥을 깨뜨린다."],
]},
{num:12,en:"Chapter 12: The Attack by Fire",kr:"제12편: 화공 (火攻)",p:[
['Move not unless you see an <V d="이점, 유리함">advantage</V>; use not your troops unless there is something to be <V d="얻다, 획득하다">gained</V>; fight not unless the position is <V d="위급한, 중대한">critical</V>.',"이점이 보이지 않으면 움직이지 말고, 얻을 것이 없으면 병력을 쓰지 말고, 위급하지 않으면 싸우지 마라."],
['No ruler should put troops into the field merely to <V d="만족시키다, 충족시키다">gratify</V> his own <V d="화, 울분">spleen</V>; no general should fight a battle simply out of <V d="화, 분노, 짜증">pique</V>.',"어떤 군주도 화풀이를 위해 군대를 보내서는 안 되고, 어떤 장수도 화가 나서 전투를 벌여서는 안 된다."],
['Anger may in time change to <V d="기쁨, 환희">gladness</V>; <V d="짜증, 성가심">vexation</V> may be succeeded by <V d="만족, 충족">content</V>. But a kingdom that has once been destroyed can never come again into being; nor can the dead ever be brought back to life.',"분노는 기쁨으로 바뀔 수 있고, 짜증은 만족으로 이어질 수 있다. 그러나 파괴된 왕국은 다시 존재할 수 없고, 죽은 자를 다시 살릴 수도 없다."],
['Hence the <V d="계몽된, 현명한">enlightened</V> ruler is <V d="주의 깊은, 신중한">heedful</V>, and the good general full of <V d="조심, 주의">caution</V>. This is the way to keep a country at peace and an army <V d="온전한, 손상되지 않은">intact</V>.',"현명한 군주는 신중하고 훌륭한 장수는 조심으로 가득하다. 이것이 나라를 평화롭게 하고 군대를 온전히 보전하는 방법이다."],
]},
{num:13,en:"Chapter 13: The Use of Spies",kr:"제13편: 용간 (用間)",p:[
['What enables the wise <V d="군주, 주권자">sovereign</V> and the good general to strike and conquer, and achieve things beyond the reach of <V d="보통의, 평범한">ordinary</V> men, is <V d="선견지명, 미리 아는 것">FOREKNOWLEDGE</V>.',"현명한 군주와 훌륭한 장수가 적을 치고 이기며, 보통 사람의 능력을 넘어서는 일을 이루게 하는 것은 선지(先知)이다."],
['Knowledge of the enemy\'s <V d="배치, 성향">dispositions</V> can only be <V d="얻어지다, 획득되다">obtained</V> from other men.',"적의 배치에 대한 지식은 오직 사람을 통해서만 얻을 수 있다."],
['Hence the use of spies, of whom there are five classes: <V d="현지 첩자">Local spies</V>; <V d="내부 첩자">inward spies</V>; <V d="전향한 첩자">converted spies</V>; <V d="희생될 첩자">doomed spies</V>; <V d="생환하는 첩자">surviving spies</V>.',"그러므로 첩자를 활용하는데, 다섯 종류가 있다: 향간, 내간, 반간, 사간, 생간."],
['Be <V d="미묘한, 교묘한">subtle</V>! be subtle! and use your spies for every kind of business.',"미묘하라! 미묘하라! 모든 종류의 일에 첩자를 활용하라."],
['Hence it is only the enlightened ruler and the wise general who will use the highest <V d="지성, 정보력">intelligence</V> of the army for purposes of <V d="첩보 활동, 정탐">spying</V> and <V d="그로 인해, 그렇게 함으로써">thereby</V> they achieve great results.',"현명한 군주와 지혜로운 장수만이 군대 최고의 지성을 첩보 목적에 활용하여 큰 성과를 이룬다."],
]}
];

// ===== Kokoro init =====
function setKokoroStatus(state,msg){
  var el=document.getElementById('kokoroStatus');
  el.className='kokoro-status '+state;
  el.textContent=msg;
}

async function initKokoroEngine(){
  if(kokoroReady||kokoroInitializing) return kokoroReady;
  kokoroInitializing=true;
  // Check if model is already cached
  var modelCached=false;
  try{
    if(window.caches){
      var cacheNames=await caches.keys();
      modelCached=cacheNames.some(function(n){return n.indexOf('kokoro')!==-1||n.indexOf('onnx')!==-1||n.indexOf('tts')!==-1});
    }
    if(!modelCached&&window.indexedDB){
      var dbs=await indexedDB.databases();
      modelCached=dbs.some(function(d){return d.name&&(d.name.indexOf('kokoro')!==-1||d.name.indexOf('onnx')!==-1||d.name.indexOf('tts')!==-1)});
    }
  }catch(e){}

  if(modelCached){
    setKokoroStatus('loading','🔄 Kokoro AI 캐시에서 로딩 중... (이미 다운로드됨)');
  }else{
    setKokoroStatus('loading','🔄 Kokoro AI 모델 로딩 중... (최초 1회, ~80MB 다운로드 후 캐시됨)');
  }
  try{
    // Configure tts.rocks TTS object
    window.TTS=window.TTS||{};
    TTS.TTSProvider='kokoro';
    TTS.useKokoroTTS=true;
    // Ensure kokoroSettings exists
    if(!TTS.kokoroSettings) TTS.kokoroSettings={rate:false,voiceName:false,model:'kokoro-82M-v1.0'};

    if(typeof TTS.initKokoro==='function'){
      var result=await TTS.initKokoro();
      if(result!==false && TTS.kokoroTtsInstance){
        kokoroReady=true;
        setKokoroStatus('ready','✅ Kokoro AI 준비 완료! ('+(TTS.kokoroDevice||'wasm')+')');
        setTimeout(function(){
          var el=document.getElementById('kokoroStatus');
          if(el)el.style.display='none';
        },3500);
        // Start preloading current chapter
        setTimeout(function(){preloadChapter(current)},500);
      } else {
        throw new Error('인스턴스 생성 실패');
      }
    } else {
      throw new Error('tts.js 미로드 — initKokoro 없음');
    }
  }catch(e){
    kokoroReady=false;
    setKokoroStatus('error','⚠ Kokoro 로드 실패: '+e.message);
    console.error('Kokoro init error:',e);
  }
  kokoroInitializing=false;
  return kokoroReady;
}

// ===== Audio cache & preload =====
function cacheKey(text,voiceName,speed){return voiceName+'|'+speed+'|'+text}

function yieldToUI(){return new Promise(function(r){setTimeout(r,50)})}

function cancelPreload(){
  preloadCancelled=true;
  preloadQueue=null;
}

function updatePreloadStatus(){}

function updatePreloadTag(chIdx,pIdx,state){
  var el=document.getElementById('pl'+chIdx+'-'+pIdx);
  if(!el) return;
  if(state==='loading'){el.className='preload-tag loading';el.textContent='🔄 생성중'}
  else if(state==='done'){el.className='preload-tag done';el.textContent='✅ 준비됨'}
  else{el.className='preload-tag waiting';el.textContent='⏳ 대기'}
}

async function preloadChapter(chIdx){
  if(!kokoroReady) return;
  var sel=getVoiceSelection();
  if(sel.type!=='kokoro') return;
  var speed=parseFloat(document.getElementById('speedSelect').value);
  var voiceName=sel.voice.voice;
  var texts=chapters[chIdx].p.map(function(pair){return stripTags(pair[0])});

  // Cancel any running preload
  if(preloading){cancelPreload(); await yieldToUI()}

  preloadCancelled=false;
  preloadChapterIdx=chIdx;
  preloadTotal=texts.length;
  preloadDone=0;

  var items=[];
  for(var ti=0;ti<texts.length;ti++){
    items.push({text:texts[ti],voice:voiceName,speed:speed,pIdx:ti});
  }
  preloadQueue=items;

  preloading=true;

  while(preloadQueue&&preloadQueue.length>0){
    if(preloadCancelled){preloading=false;return}
    var item=preloadQueue.shift();
    if(!item) break;
    var key=cacheKey(item.text,item.voice,item.speed);
    if(audioCache[key]){
      updatePreloadTag(chIdx,item.pIdx,'done');
      continue;
    }
    updatePreloadTag(chIdx,item.pIdx,'loading');
    try{
      await yieldToUI();
      if(preloadCancelled){preloading=false;return}
      TTS.kokoroSettings.voiceName=item.voice;
      TTS.kokoroSettings.speed=item.speed;
      if(TTS.kokoroTtsInstance&&TTS.kokoroTtsInstance.generate){
        var raw=await TTS.kokoroTtsInstance.generate(item.text);
        if(raw&&raw.audio){
          var blob=new Blob([raw.audio],{type:'audio/wav'});
          audioCache[key]=URL.createObjectURL(blob);
        }
      }
      updatePreloadTag(chIdx,item.pIdx,'done');
      await yieldToUI();
    }catch(e){
      console.warn('preload skip:',e);
      updatePreloadTag(chIdx,item.pIdx,'waiting');
    }
  }
  preloading=false;
}

// ===== Voice dropdown =====
var voiceLoadAttempts=0, voicesLoaded=false;
function loadVoices(){
  if(voicesLoaded) return;
  var all=synth.getVoices();
  if(!all.length&&voiceLoadAttempts<10){voiceLoadAttempts++;setTimeout(loadVoices,300);return}
  voices=all.filter(function(v){return v.lang&&v.lang.indexOf('en')===0});
  voicesLoaded=true;
  buildVoiceDropdown();
}
function buildVoiceDropdown(){
  var sel=document.getElementById('voiceSelect');
  var opts=['<optgroup label="🤖 Kokoro AI (고품질·무료·로컬)">'];
  kokoroVoices.forEach(function(v,i){
    var icon=v.gender==='M'?'👨':'👩';
    opts.push('<option value="kokoro:'+i+'">'+icon+' ['+v.region+'] '+v.name+'</option>');
  });
  opts.push('</optgroup>');
  if(voices.length){
    opts.push('<optgroup label="📱 기기 내장 음성">');
    voices.forEach(function(v,i){
      var n=v.name,tag='';
      if(n.indexOf('Samsung')!==-1)tag='삼성';else if(n.indexOf('Google')!==-1)tag='Google';
      else if(n.indexOf('Microsoft')!==-1)tag='MS';else if(n.indexOf('Apple')!==-1)tag='Apple';
      var region=v.lang==='en-US'?'US':v.lang==='en-GB'?'UK':v.lang==='en-AU'?'AU':v.lang.replace('en-','');
      var clean=n.replace(/Samsung |Microsoft |Google |Apple /g,'').replace(/ Online \(Natural\)/g,'').replace(/\s*\(.*?\)\s*/g,' ').trim();
      opts.push('<option value="local:'+i+'">'+(tag?'['+tag+' '+region+'] ':'['+region+'] ')+clean+'</option>');
    });
    opts.push('</optgroup>');
  }
  sel.innerHTML=opts.join('');
  sel.value='kokoro:0';
}
if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;
loadVoices();setTimeout(loadVoices,500);setTimeout(loadVoices,1500);
setTimeout(function(){if(!voicesLoaded){voicesLoaded=true;buildVoiceDropdown()}},2000);

function getVoiceSelection(){
  var val=document.getElementById('voiceSelect').value;
  if(val.indexOf('kokoro:')===0) return {type:'kokoro',voice:kokoroVoices[parseInt(val.split(':')[1])]};
  if(val.indexOf('local:')===0) return {type:'local',voice:voices[parseInt(val.split(':')[1])]};
  return {type:'local',voice:null};
}

// ===== Text processing =====
function processEN(html){return html.replace(/<V d="([^"]+)">([^<]+)<\/V>/g,'<span class="vocab" data-d="$1">$2</span>')}
function stripTags(html){return html.replace(/<V d="[^"]+">([^<]+)<\/V>/g,'$1').replace(/<[^>]+>/g,'')}

// ===== Render =====
function render(){
  document.getElementById('tabs').innerHTML=chapters.map(function(c,i){
    return '<button class="tab-btn'+(i===current?' active':'')+'" onclick="go('+i+')">'+c.num+'편</button>';
  }).join('');
  document.getElementById('chapters').innerHTML=chapters.map(function(c,i){
    var cls='chapter'+(i===current?' active':'');
    var h='<div class="'+cls+'" id="ch'+i+'"><div class="chapter-head"><h2>'+c.en+'</h2><h3>'+c.kr+'</h3><div class="line"></div></div>';
    c.p.forEach(function(pair,j){
      var krHidden=document.getElementById('toggleKr')&&!document.getElementById('toggleKr').checked?' hidden':'';
      var key=i+'-'+j, isRepeat=repeatState[key];
      h+='<div class="passage" id="p'+key+'"><div class="num">§ '+c.num+'.'+(j+1)+'</div>';
      h+='<div class="en">'+processEN(pair[0])+'</div>';
      h+='<div class="btn-row">';
      h+='<button class="listen-btn" onclick="speak('+i+','+j+',this)">▶ Listen</button>';
      h+='<button class="repeat-btn'+(isRepeat?' active':'')+'" onclick="toggleRepeat('+i+','+j+',this)">'+(isRepeat?'■ 반복중':'🔁 Repeat')+'</button>';
      var plText=stripTags(pair[0]),plSel=getVoiceSelection(),plState='waiting',plLabel='⏳ 대기';
      if(plSel.type==='kokoro'){
        var spd=parseFloat(document.getElementById('speedSelect').value);
        if(audioCache[cacheKey(plText,plSel.voice.voice,spd)]){plState='done';plLabel='✅ 준비됨'}
      }
      h+='<span class="preload-tag '+plState+'" id="pl'+i+'-'+j+'">'+plLabel+'</span>';
      h+='</div><div class="kr'+krHidden+'">'+pair[1]+'</div></div>';
    });
    return h+'</div>';
  }).join('');
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===chapters.length-1;
}
function go(i){stopAll();current=i;render();window.scrollTo(0,0);if(kokoroReady)setTimeout(function(){preloadChapter(i)},300)}
function goNav(d){go(current+d)}

// ===== TTS =====
function speak(ci,pi,btn){
  stopSpeech();
  if(playingEl===btn){playingEl=null;return}
  var text=stripTags(chapters[ci].p[pi][0]);
  var sel=getVoiceSelection();
  btn.textContent='■ Stop';btn.classList.add('stop');
  btn.closest('.passage').classList.add('playing');
  playingEl=btn;
  if(sel.type==='kokoro') speakKokoro(text,sel.voice,ci,pi,btn);
  else speakLocal(text,sel.voice,ci,pi,btn);
}

function speakLocal(text,voice,ci,pi,btn){
  synth.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.rate=parseFloat(document.getElementById('speedSelect').value);
  if(voice){u.voice=voice;u.lang=voice.lang}else{u.lang='en-US'}
  u.onend=function(){onSpeakEnd(ci,pi,btn)};
  u.onerror=function(){resetBtn(btn)};
  setTimeout(function(){synth.speak(u)},50);
}

async function speakKokoro(text,voiceObj,ci,pi,btn){
  try{
    if(!kokoroReady){
      btn.textContent='⏳ 준비중...';
      var ok=await initKokoroEngine();
      if(!ok){speakLocal(text,null,ci,pi,btn);return}
    }

    var speed=parseFloat(document.getElementById('speedSelect').value);
    var key=cacheKey(text,voiceObj.voice,speed);

    // Cache hit — instant playback, no WASM needed
    if(audioCache[key]){
      btn.textContent='🔊 재생중';
      var a=new Audio(audioCache[key]);
      a.onended=function(){onSpeakEnd(ci,pi,btn)};
      a.onerror=function(){resetBtn(btn)};
      TTS.audio=a;
      a.play();
      return;
    }

    // Cache miss — pause preload, generate, then resume
    var wasPreloading=preloading;
    var savedQueue=preloadQueue?preloadQueue.slice():null;
    var savedChapter=preloadChapterIdx;
    if(wasPreloading) cancelPreload();
    await yieldToUI();

    btn.textContent='⏳ 생성중...';
    TTS.kokoroSettings.voiceName = voiceObj.voice;
    TTS.kokoroSettings.speed = speed;

    if(TTS.kokoroTtsInstance&&TTS.kokoroTtsInstance.generate){
      var raw=await TTS.kokoroTtsInstance.generate(text);
      if(raw&&raw.audio){
        var blob=new Blob([raw.audio],{type:'audio/wav'});
        audioCache[key]=URL.createObjectURL(blob);
        updatePreloadTag(ci,pi,'done');
        btn.textContent='🔊 재생중';
        var a2=new Audio(audioCache[key]);
        a2.onended=function(){
          onSpeakEnd(ci,pi,btn);
          // Resume preload after playback ends
          if(wasPreloading&&savedChapter>=0) setTimeout(function(){preloadChapter(savedChapter)},200);
        };
        a2.onerror=function(){resetBtn(btn)};
        TTS.audio=a2;
        a2.play();
        return;
      }
    }

    // Fallback: use tts.rocks pipeline
    btn.textContent='🔊 재생중';
    var origFinished = TTS.finishedAudio;
    var handled = false;
    TTS.finishedAudio = function(e){
      if(!handled){
        handled = true;
        TTS.finishedAudio = origFinished;
        onSpeakEnd(ci,pi,btn);
        if(wasPreloading&&savedChapter>=0) setTimeout(function(){preloadChapter(savedChapter)},200);
      }
    };
    await TTS.kokoroTTS(text);
    if(TTS.audio && !handled){
      TTS.audio.onended = function(e){
        if(!handled){
          handled = true;
          TTS.finishedAudio = origFinished;
          onSpeakEnd(ci,pi,btn);
        }
      };
    }

  }catch(err){
    console.error('Kokoro TTS error:',err);
    resetBtn(btn);
    speakLocal(text,null,ci,pi,btn);
  }
}

function onSpeakEnd(ci,pi,btn){
  resetBtn(btn);
  var key=ci+'-'+pi;
  if(repeatState[key]){
    setTimeout(function(){
      if(repeatState[key]){
        var el=document.querySelector('#p'+key+' .listen-btn');
        if(el) speak(ci,pi,el);
      }
    },800);
  }
}

function stopSpeech(){
  synth.cancel();
  try{if(window.TTS&&TTS.audio){TTS.audio.pause();TTS.audio.currentTime=0}}catch(e){}
  if(playingEl)resetBtn(playingEl);
}

function resetBtn(b){
  if(!b)return;
  b.textContent='▶ Listen';b.classList.remove('stop');
  var p=b.closest('.passage');if(p)p.classList.remove('playing');
  playingEl=null;
}

function toggleRepeat(ci,pi,btn){
  var key=ci+'-'+pi;
  if(repeatState[key]){
    delete repeatState[key];
    btn.textContent='🔁 Repeat';btn.classList.remove('active');
    stopSpeech();
  }else{
    stopAll();
    repeatState[key]=true;
    btn.textContent='■ 반복중';btn.classList.add('active');
    speak(ci,pi,btn.closest('.passage').querySelector('.listen-btn'));
  }
}

function stopAll(){
  stopSpeech();
  for(var k in repeatState)delete repeatState[k];
  var btns=document.querySelectorAll('.repeat-btn.active');
  for(var i=0;i<btns.length;i++){btns[i].textContent='🔁 Repeat';btns[i].classList.remove('active')}
}

document.getElementById('toggleKr').onchange=function(){
  var els=document.querySelectorAll('.passage .kr');
  for(var i=0;i<els.length;i++){if(this.checked)els[i].classList.remove('hidden');else els[i].classList.add('hidden')}
};

// ===== Tooltip =====
var tooltip=document.getElementById('tooltip'),ttWord=document.getElementById('ttWord'),ttMean=document.getElementById('ttMean'),hideTimer=null;
document.addEventListener('click',function(e){
  var v=e.target.closest('.vocab');
  if(v){
    e.preventDefault();
    ttWord.textContent=v.textContent;
    ttMean.textContent=v.getAttribute('data-d');
    tooltip.classList.add('show');
    var rect=v.getBoundingClientRect(),tx=rect.left+rect.width/2,ty=rect.top-8;
    tooltip.style.left=Math.max(10,Math.min(tx-80,window.innerWidth-270))+'px';
    tooltip.style.top=(ty-60<0?(rect.bottom+8):(ty-50))+'px';
    clearTimeout(hideTimer);
    hideTimer=setTimeout(function(){tooltip.classList.remove('show')},2500);
  }else{tooltip.classList.remove('show')}
});

render();
</script>
